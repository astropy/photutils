[tox]
envlist =
    py{311,312}-test-oldestdeps
    py{311,312,313,314}-test{,-alldeps,-devdeps,-predeps,-devinfra}{,-cov}
    oldest_cython
    build_docs
    linkcheck
    codestyle
    pep517
    bandit
    asdf-schemas
isolated_build = true

[testenv]
# Suppress display of matplotlib plots generated during docs build
setenv =
    MPLBACKEND=agg
    devdeps: PIP_EXTRA_INDEX_URL = https://pypi.anaconda.org/scientific-python-nightly-wheels/simple https://pypi.anaconda.org/liberfa/simple https://pypi.anaconda.org/astropy/simple

# Pass through the following environment variables which may be needed
# for the CI
passenv = HOME,WINDIR,LC_ALL,LC_CTYPE,CC,CI

# Run the tests in a temporary directory to make sure that we don't
# import this package from the source tree
changedir = .tmp/{envname}

# tox environments are constructed with so-called 'factors' (or terms)
# separated by hyphens, e.g., test-devdeps-cov. Lines below starting
# with factor: will only take effect if that factor is included in the
# environment name. To see a list of example environments that can be
# run, along with a description, run:
#
#     tox -l -v
#
description =
    Run tests
    alldeps: with all optional dependencies
    predeps: with the latest pre-release versions of key dependencies
    devdeps: with the latest developer versions of key dependencies
    devinfra: like devdeps but also dev versions of infrastructure packages
    oldestdeps: with the oldest supported versions of key dependencies
    cov: and test coverage

# The following provides some specific pinnings for key packages
deps =
    cov: pytest-cov

    oldestdeps: packaging

    devdeps: numpy>=0.0.dev0
    devdeps: scipy>=0.0.dev0
    devdeps: scikit-image>=0.0.dev0
    devdeps: matplotlib>=0.0.dev0
    devdeps: pyerfa>=0.0.dev0
    devdeps: astropy>=0.0.dev0
    devdeps: git+https://github.com/spacetelescope/gwcs.git

    # Latest developer version of infrastructure packages
    devinfra: git+https://github.com/pytest-dev/pytest.git
    devinfra: git+https://github.com/astropy/extension-helpers.git
    devinfra: git+https://github.com/astropy/pytest-doctestplus.git
    devinfra: git+https://github.com/astropy/pytest-remotedata.git
    devinfra: git+https://github.com/astropy/pytest-astropy-header.git
    devinfra: git+https://github.com/astropy/pytest-arraydiff.git
    devinfra: git+https://github.com/astropy/pytest-filter-subpackage.git
    devinfra: git+https://github.com/astropy/pytest-astropy.git

# The following indicates which [project.optional-dependencies] from
# pyproject.toml will be installed
extras =
    test: test
    alldeps: all
    build_docs: docs

install_command =
    !devdeps: python -I -m pip install
    devdeps: python -I -m pip install -v --pre

# oldestdeps includes oldest build dependencies (e.g., Cython).
commands_pre =
    oldestdeps: python -c "import sys; assert (3,11) <= sys.version_info < (3,13), 'Requires Python 3.11 or 3.12'"

    oldestdeps-!alldeps: python {toxinidir}/scripts/pin_minimum_requirements.py --path {envdir}
    oldestdeps-!alldeps: python -m pip install -r {envdir}/photutils_oldest_deps.txt

    # Older pyparsing is needed to avoid pyparsing deprecation warnings
    # caused by matplotlib.
    oldestdeps-alldeps: python -m pip install "pyparsing==3.2.5"
    oldestdeps-alldeps: python {toxinidir}/scripts/pin_minimum_requirements.py --path {envdir} --all
    oldestdeps-alldeps: python -m pip install -r {envdir}/photutils_oldest_deps-all.txt

commands =
    pip freeze --all
    pytest --pyargs photutils {toxinidir}/docs \
    cov: --cov photutils --cov-config={toxinidir}/pyproject.toml --cov-report xml:{toxinidir}/coverage.xml --cov-report term-missing \
    {posargs}

pip_pre =
    predeps: true
    !predeps: false

[testenv:build_docs]
changedir = docs
description = Generate the HTML documentation using sphinx-build
extras = docs
commands =
    pip freeze --all
    sphinx-build -W -b html . _build/html

[testenv:linkcheck]
changedir = docs
description = Check the links in the HTML docs
extras = docs
commands =
    pip freeze --all
    sphinx-build -W -b linkcheck . _build/html

[testenv:codestyle]
skip_install = true
changedir = .
description = Check code style with flake8
deps = flake8
commands = flake8 photutils --count --max-line-length=79

[testenv:pep517]
skip_install = true
changedir = .
description = Build source distribution and check with twine
deps =
    build
    twine
commands =
    python -m build --sdist .
    twine check dist/* --strict

[testenv:bandit]
skip_install = true
changedir = .
description = Security check with bandit
deps = bandit
commands = bandit -r photutils -c pyproject.toml

[testenv:asdf-schemas]
changedir = .
description = Run ASDF schema validation
deps = asdf-astropy
extras = test
commands =
    pip freeze --all
    pytest photutils/resources/schemas {posargs}

[testenv:oldest_cython]
skip_install = true
changedir = .
description = Check Cython compilation with the oldest supported Cython version
deps =
    packaging
commands_pre =
    python -c "import sys; assert (3,11) <= sys.version_info < (3,13), 'Requires Python 3.11 or 3.12'"
    python {toxinidir}/scripts/pin_minimum_requirements.py --path {envdir}
    python -m pip install -r {envdir}/photutils_oldest_deps.txt
commands =
    pip freeze --all
    python -c "from Cython.Build import cythonize; cythonize('photutils/**/*.pyx', force=True, language_level='3')"
