%YAML 1.1
---
$schema: "http://stsci.edu/schemas/yaml-schema/draft-01"
id: "asdf://astropy.org/photutils/schemas/psf/image_psf-1.0.0"
title: ImagePSF
description: |
  ASDF schema for serializing a 2D Image PSF model.



examples:
  -
    - A ImagePSF with a flux of 71.4, centered at (24.3, 25.2) pixels,
      and alpha 0f 5.1 and beta 0f 3.2
      psf.ImagePSF(flux=71.4, x_0=24.3, y_0=25.2, alpha=5.1, beta=3.2)
    - |
      !<tag:astropy.org:photutils/psf/image_psf-1.0.0>
        bbox_factor: 10.0
        bounds:
          alpha: [1.1754943508222875e-38, null]
          beta: [1.0, null]
        fixed: {alpha: true, beta: true}
        flux: 71.4
        inputs: [x, y]
        outputs: [z]
        x_0: 24.3
        y_0: 25.2
        alpha: 5.1
        beta: 3.2

allOf:
  - $ref: "http://stsci.edu/schemas/asdf/transform/transform-1.4.0"
  - type: object
    properties:
      data: "tag:stsci.edu:asdf/core/ndarray-1.*"
      flux:
        anyOf:
          - tag: "tag:stsci.edu:asdf/unit/quantity-1.*"
          - type: number
        description: Total integrated flux of the PSF.
      x_0:
        anyOf:
          - tag: "tag:stsci.edu:asdf/unit/quantity-1.*"
          - type: number
        description: |
          Position of the peak along the x axis.
      y_0:
        anyOf:
          - tag: "tag:stsci.edu:asdf/unit/quantity-1.*"
          - type: number
        description: |
          Position of the peak along the y axis.
      origin:
        type: array
        items:
          type: number
        minItems: 2
        maxItems: 2
        description: |
          The origin of the image in the x and y directions.
      fill_value:
        type: number
        description: |
          Assign value to pixels outside the input pixel grid 
          to avoid extrapolation.
      oversampling:
        anyOf:
        - type: array
          items:
            type: number
          minItems: 2
          maxItems: 2
        - type: number
        description: |
          The oversampling factor in the x and y directions. This is used to
          determine the size of the bounding box for the PSF.
    required: [flux, x_0, y_0]
...
